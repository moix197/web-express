<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Web Express Portal Isologo">
  <defs>
    <!-- Web Express institutional gold gradient -->
    <linearGradient id="portalGold" x1="292" y1="184" x2="812" y2="724" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E6CC91"/>
      <stop offset="45%" stop-color="#C9AE7B"/>
      <stop offset="100%" stop-color="#A98545"/>
    </linearGradient>

    <radialGradient id="portalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9AE7B" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#C9AE7B" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#C9AE7B" stop-opacity="0"/>
    </radialGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#1D1D1D" flood-opacity="0.13"/>
